name: ci.yml
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: mvn clean verify

      - name: Upload jar
        uses: actions/upload-artifact@v4
        if: alway()
        with:
          name: jacoco-report
          path: target/site/jacoco
